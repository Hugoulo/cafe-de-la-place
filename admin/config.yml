backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "carte"
    label: "La Carte"
    files:
      - file: "index.html"
        label: "Contenu du Site"
        name: "index"
        # On force le CMS à ne pas créer de bandeau en haut
        format: "fragment" 
        fields:
          - {label: "Plat du Jour", name: "plat_du_jour", widget: "string"}
          - {label: "Prix Plat du Jour", name: "prix_plat_jour", widget: "string"}
